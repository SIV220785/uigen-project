name: PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies and setup Prisma
        run: npm run setup

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Run TypeScript type check
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Run tests
        id: tests
        continue-on-error: true
        env:
          CI: true
        run: npx vitest run --reporter=verbose

      - name: Comment on PR if checks fail
        if: always() && (steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const failures = [];
            if ('${{ steps.lint.outcome }}' === 'failure') failures.push('- ESLint failed');
            if ('${{ steps.typecheck.outcome }}' === 'failure') failures.push('- TypeScript type check failed');
            if ('${{ steps.tests.outcome }}' === 'failure') failures.push('- Tests failed');

            const body = [
              'CI review checks found errors:',
              '',
              ...failures,
              '',
              'See the workflow logs for full details.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail workflow if any check failed
        if: always() && (steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure')
        run: exit 1
